name: cppcheck

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get -y -qq install curl
          sudo apt-get -y -qq install clang-tidy cmake jq clang clang-tools cppcheck

      - name: Update Path
        run: echo "$(ls -d /usr/lib/llvm-*/bin | tail -1)" >> $GITHUB_PATH

      - name: Update compile database
        run: |
          make clean
          intercept-build make

      - name: run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --suppress=unusedFunction \
            --suppress=missingIncludeSystem \
            --suppress=staticFunction \
            --suppress=nullPointerOutOfMemory \
            --suppress=nullPointerOutOfResources \
            --suppress=constParameterCallback \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unmatchedSuppression \
            --std=c11 \
            --language=c \
            --error-exitcode=1 \
            src/*.c
